# Cloud Build: build + push all DIS service images to Artifact Registry.
#
# Run from the repo root (staging frontend = real mode, pointing at dis-ui-server):
#   gcloud builds submit --config docker/cloudbuild.yaml \
#     --substitutions=_REGION=asia-south1,_REPO=dis-images,_DIS_UI_SERVER_MODE=real,_DIS_UI_SERVER_BASE_URL=https://dis-ui-server-XXXX.run.app .
#
# Images are tagged with the build's short commit SHA ($SHORT_SHA) and :latest.
# dis-ui-server uses its existing services/dis-ui-server/Dockerfile.
# The 3 workers + the frontend use the Dockerfiles in docker/.
#
# Frontend mode is a BUILD-TIME Vite var baked into the SPA bundle (the UI reads
# VITE_DIS_UI_SERVER_MODE + VITE_DIS_UI_SERVER_BASE_URL at build, not at runtime).
# The base URL is known only AFTER dis-ui-server deploys, so it is supplied here as a
# substitution at build time (the second-apply/build ordering). The old _API_BASE /
# VITE_API_BASE pair was dead: the UI never read it.

substitutions:
  _REGION: "asia-south1"
  _REPO: "dis-images"
  # Frontend build-time mode. Default 'fixture' (safe); staging passes 'real'.
  _DIS_UI_SERVER_MODE: "fixture"
  # dis-ui-server base URL the frontend calls in real mode (empty in fixture builds).
  _DIS_UI_SERVER_BASE_URL: ""

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # dis-ui-server (existing Dockerfile in the service dir)
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - services/dis-ui-server/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/dis-ui-server:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/dis-ui-server:latest
      - .

  # csv-ingest-worker
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/csv-ingest-worker.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/csv-ingest-worker:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/csv-ingest-worker:latest
      - .

  # streaming-consumer
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/streaming-consumer.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/streaming-consumer:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/streaming-consumer:latest
      - .

  # mirror-sync-consumer
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/mirror-sync-consumer.Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mirror-sync-consumer:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mirror-sync-consumer:latest
      - .

  # dis-ui frontend (build context is the frontend package dir). The two Vite vars
  # are baked into the bundle here at build time (see the Dockerfile); a runtime env
  # would do nothing for the static SPA.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - docker/dis-ui.Dockerfile
      - --build-arg
      - VITE_DIS_UI_SERVER_MODE=${_DIS_UI_SERVER_MODE}
      - --build-arg
      - VITE_DIS_UI_SERVER_BASE_URL=${_DIS_UI_SERVER_BASE_URL}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/dis-ui:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/dis-ui:latest
      - services/dis-ui

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/dis-ui-server
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/csv-ingest-worker
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/streaming-consumer
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mirror-sync-consumer
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/dis-ui
