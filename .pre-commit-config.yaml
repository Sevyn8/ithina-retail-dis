repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to the EXACT workspace ruff version (pyproject dev-deps, ruff==).
    # A skewed pin makes files flip-flop between the hook's format and
    # `make format`; bump both together.
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
